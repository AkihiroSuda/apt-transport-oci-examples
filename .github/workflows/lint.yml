name: lint

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@a16621b09c6db4281f81a93cb393b05dcd7b7165  # v0.5.5
        with:
          # No need to hide the result in https://github.com/USERNAME/REPO/security (private),
          # as anybody can already run zizmor locally to find vulnerabilities.
          advanced-security: false
